<div class="oh-modal-overlay" id="ohCreateOfferModal">
    <div class="oh-modal-container">
        <div class="oh-modal-header">
            <h2><i data-lucide="file-text"></i> Create New Offer</h2>
            <button class="oh-modal-close-btn" id="ohModalCloseBtn"><i data-lucide="x"></i></button>
        </div>
        <div class="oh-modal-body">
            <div class="oh-form-group">
                <label>Candidate</label>
                <select id="ohOfferCandidate">
                    <option value="">Select candidate...</option>
                    <option value="Blessing Okoro">Blessing Okoro — Sales Executive</option>
                    <option value="Fatima Ibrahim">Fatima Ibrahim — Marketing Manager</option>
                    <option value="Yusuf Mohammed">Yusuf Mohammed — Backend Developer</option>
                    <option value="Hauwa Yusuf">Hauwa Yusuf — Business Analyst</option>
                    <option value="Chinedu Obi">Chinedu Obi — Product Manager</option>
                    <option value="Aisha Bello">Aisha Bello — Senior Software Engineer</option>
                    <option value="Chiamaka Okonkwo">Chiamaka Okonkwo — Software Engineering Intern</option>
                </select>
            </div>
            <div class="oh-form-row">
                <div class="oh-form-group">
                    <label>Job Role</label>
                    <input type="text" id="ohOfferJob" placeholder="e.g. Frontend Developer">
                </div>
                <div class="oh-form-group">
                    <label>Department</label>
                    <select id="ohOfferDept">
                        <option value="Engineering">Engineering</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Operations">Operations</option>
                        <option value="Product">Product</option>
                        <option value="Design">Design</option>
                        <option value="Human Resources">Human Resources</option>
                    </select>
                </div>
            </div>
            <div class="oh-form-row">
                <div class="oh-form-group">
                    <label>Base Salary</label>
                    <input type="text" id="ohOfferSalary" placeholder="e.g. ₦500,000">
                </div>
                <div class="oh-form-group">
                    <label>Contract Type</label>
                    <select id="ohOfferContract">
                        <option value="permanent">Permanent</option>
                        <option value="contract">Contract</option>
                        <option value="part_time">Part Time</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>
            </div>
            <div class="oh-form-group">
                <label>Start Date</label>
                <input type="date" id="ohOfferStartDate">
            </div>
            <div class="oh-form-group">
                <label>Notes (optional)</label>
                <textarea id="ohOfferNotes" rows="3" placeholder="Additional offer notes..."></textarea>
            </div>
        </div>
        <div class="oh-modal-footer">
            <button class="oh-btn oh-btn-secondary" id="ohModalCancelBtn">Cancel</button>
            <button class="oh-btn oh-btn-primary" id="ohModalSubmitBtn"><i data-lucide="send"></i> Create Offer</button>
        </div>
    </div>
</div>
