<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Features - Company Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="comp-body">

    <main class="comp-tab-container">
        <div class="comp-card comp-card-large">
            <h3 class="comp-card-title">AI-Powered Features</h3>

            <div class="comp-policy-row">
                <div class="comp-policy-info">
                    <h4>AI Candidate Insights</h4>
                    <p>Generate AI-powered insights about candidates</p>
                </div>
                <label class="comp-toggle-switch">
                    <input type="checkbox" checked>
                    <span class="comp-toggle-slider"></span>
                </label>
            </div>

            <div class="comp-policy-row">
                <div class="comp-policy-info">
                    <h4>Activity Summaries</h4>
                    <p>Auto-generate summaries of candidate activities</p>
                </div>
                <label class="comp-toggle-switch">
                    <input type="checkbox" checked>
                    <span class="comp-toggle-slider"></span>
                </label>
            </div>

            <div class="comp-policy-row">
                <div class="comp-policy-info">
                    <h4>Resume Screening</h4>
                    <p>Enable AI-powered resume screening and audit</p>
                </div>
                <label class="comp-toggle-switch">
                    <input type="checkbox" checked>
                    <span class="comp-toggle-slider"></span>
                </label>
            </div>
        </div>
    </main>

</body>
</html>
