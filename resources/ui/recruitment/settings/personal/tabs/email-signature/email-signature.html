<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature - Personal Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="cfg-body">

    <main class="cfg-tab-container">
        <div class="cfg-card">
            <div class="cfg-card-header-toggle">
                <h3 class="cfg-card-title">Email Signature</h3>
                <label class="cfg-toggle-switch">
                    <input type="checkbox" checked>
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>
            <div class="cfg-form-group">
                <label class="cfg-form-label">Signature Content</label>
                <textarea class="cfg-form-textarea" rows="6">Best regards,
John Doe
Admin</textarea>
            </div>
            <p class="cfg-field-hint">This signature will be automatically added to all outgoing emails.</p>
        </div>
    </main>

</body>
</html>
