<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations - Personal Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="cfg-body">

    <main class="cfg-tab-container">
        <div class="cfg-integrations-wrapper">
            <h3 class="cfg-card-subheading">Connected Integrations</h3>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-slack"><i class="fa-brands fa-slack"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Slack</h4>
                        <p>Communication</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-zoom"><i class="fa-solid fa-video"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Zoom</h4>
                        <p>Video Conferencing</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-meet"><i class="fa-solid fa-camera-video"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Google Meet</h4>
                        <p>Video Conferencing</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-teams"><i class="fa-solid fa-users-rectangle"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Microsoft Teams</h4>
                        <p>Video Conferencing</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-gmail"><i class="fa-solid fa-envelope"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Gmail</h4>
                        <p>Email</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-outlook"><i class="fa-solid fa-envelope-open"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Outlook</h4>
                        <p>Email</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-integration-card">
                <div class="cfg-integration-left">
                    <div class="cfg-integration-icon color-cal"><i class="fa-solid fa-calendar-check"></i></div>
                    <div class="cfg-integration-info">
                        <h4>Google Calendar</h4>
                        <p>Calendar</p>
                    </div>
                </div>
                <label class="cfg-toggle-switch">
                    <input type="checkbox">
                    <span class="cfg-toggle-slider"></span>
                </label>
            </div>

            <div class="cfg-add-custom-integration">
                <i class="fa-solid fa-plus"></i> Add Custom Integration
            </div>
        </div>
    </main>

</body>
</html>
