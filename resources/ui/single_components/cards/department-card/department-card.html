<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Department Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="department-card.css">
</head>
<body>
  <div class="dc-wrapper">
    <div class="dc-card">
      <div class="dc-card-emoji">💻</div>
      <div class="dc-card-count">48</div>
      <div class="dc-card-name">Engineering</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:78%;background:linear-gradient(90deg,#E91E8C,#FF6BA8);"></div></div>
      <div class="dc-budget-lbl">78% budget</div>
    </div>
    <div class="dc-card">
      <div class="dc-card-emoji">💰</div>
      <div class="dc-card-count">22</div>
      <div class="dc-card-name">Finance</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:89%;background:linear-gradient(90deg,#f59e0b,#fbbf24);"></div></div>
      <div class="dc-budget-lbl">89% budget</div>
    </div>
    <div class="dc-card">
      <div class="dc-card-emoji">📣</div>
      <div class="dc-card-count">18</div>
      <div class="dc-card-name">Marketing</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:102%;background:linear-gradient(90deg,#ef4444,#f87171);"></div></div>
      <div class="dc-budget-lbl">102% budget</div>
    </div>
    <div class="dc-card">
      <div class="dc-card-emoji">👥</div>
      <div class="dc-card-count">14</div>
      <div class="dc-card-name">HR</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:77%;background:linear-gradient(90deg,#3b82f6,#60a5fa);"></div></div>
      <div class="dc-budget-lbl">77% budget</div>
    </div>
    <div class="dc-card">
      <div class="dc-card-emoji">🎨</div>
      <div class="dc-card-count">11</div>
      <div class="dc-card-name">Design</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:99%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);"></div></div>
      <div class="dc-budget-lbl">99% budget</div>
    </div>
    <div class="dc-card">
      <div class="dc-card-emoji">⚙️</div>
      <div class="dc-card-count">31</div>
      <div class="dc-card-name">Operations</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:97%;background:linear-gradient(90deg,#10b981,#34d399);"></div></div>
      <div class="dc-budget-lbl">97% budget</div>
    </div>
    <div class="dc-card">
      <div class="dc-card-emoji">👑</div>
      <div class="dc-card-count">4</div>
      <div class="dc-card-name">Executive</div>
      <div class="dc-budget-bar"><div class="dc-budget-fill" style="width:86%;background:linear-gradient(90deg,#f97316,#fb923c);"></div></div>
      <div class="dc-budget-lbl">86% budget</div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
