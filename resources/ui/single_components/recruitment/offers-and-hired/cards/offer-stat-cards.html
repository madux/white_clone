<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleonHR - Offer Stat Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="osc-wrapper">
    <div class="osc-metrics-grid">
        <div class="osc-metric-card active" style="--osc-card-color: #E60067;">
            <div class="osc-metric-val">15</div>
            <div class="osc-metric-label">TOTAL OFFERS</div>
        </div>
        <div class="osc-metric-card" style="--osc-card-color: #E28700;">
            <div class="osc-metric-val">5</div>
            <div class="osc-metric-label">AWAITING</div>
        </div>
        <div class="osc-metric-card" style="--osc-card-color: #00B351;">
            <div class="osc-metric-val">4</div>
            <div class="osc-metric-label">ACCEPTED</div>
        </div>
        <div class="osc-metric-card" style="--osc-card-color: #E61C24;">
            <div class="osc-metric-val">1</div>
            <div class="osc-metric-label">REJECTED</div>
        </div>
        <div class="osc-metric-card" style="--osc-card-color: #8338EC;">
            <div class="osc-metric-val">1</div>
            <div class="osc-metric-label">COUNTERED</div>
        </div>
    </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
