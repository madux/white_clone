<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleonHR - Create Offer Modal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="com-modal-overlay open">
    <div class="com-modal-container">
        <div class="com-modal-header">
            <h2><i data-lucide="file-text"></i> Create New Offer</h2>
            <button class="com-modal-close-btn"><i data-lucide="x"></i></button>
        </div>
        <div class="com-modal-body">
            <div class="com-form-group">
                <label>Candidate</label>
                <select>
                    <option value="">Select candidate...</option>
                    <option>Blessing Okoro — Sales Executive</option>
                    <option>Fatima Ibrahim — Marketing Manager</option>
                    <option>Yusuf Mohammed — Backend Developer</option>
                </select>
            </div>
            <div class="com-form-row">
                <div class="com-form-group">
                    <label>Job Role</label>
                    <input type="text" placeholder="e.g. Frontend Developer">
                </div>
                <div class="com-form-group">
                    <label>Department</label>
                    <select>
                        <option>Engineering</option>
                        <option>Sales</option>
                        <option>Marketing</option>
                    </select>
                </div>
            </div>
            <div class="com-form-row">
                <div class="com-form-group">
                    <label>Base Salary</label>
                    <input type="text" placeholder="e.g. ₦500,000">
                </div>
                <div class="com-form-group">
                    <label>Contract Type</label>
                    <select>
                        <option>Permanent</option>
                        <option>Contract</option>
                        <option>Part Time</option>
                        <option>Internship</option>
                    </select>
                </div>
            </div>
            <div class="com-form-group">
                <label>Start Date</label>
                <input type="date">
            </div>
            <div class="com-form-group">
                <label>Notes (optional)</label>
                <textarea rows="3" placeholder="Additional offer notes..."></textarea>
            </div>
        </div>
        <div class="com-modal-footer">
            <button class="com-btn com-btn-secondary">Cancel</button>
            <button class="com-btn com-btn-primary"><i data-lucide="send"></i> Create Offer</button>
        </div>
    </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
