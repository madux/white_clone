<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Details - Company Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="comp-body">

    <main class="comp-tab-container">
        <div class="comp-card">
            <h3 class="comp-card-title">Company Information</h3>
            <div class="comp-form-group">
                <label class="comp-form-label">Company Name <span class="comp-required">*</span></label>
                <input type="text" class="comp-form-input" value="CleonHR Demo">
            </div>
            <div class="comp-form-group">
                <label class="comp-form-label">Address</label>
                <input type="text" class="comp-form-input" value="123 Main St, Lagos, Nigeria">
            </div>
            <div class="comp-form-group">
                <label class="comp-form-label">Company Timezone</label>
                <select class="comp-form-select">
                    <option selected>Africa/Lagos (WAT)</option>
                    <option>Europe/London (GMT)</option>
                    <option>America/New_York (EST)</option>
                </select>
            </div>
        </div>

        <div class="comp-card">
            <h3 class="comp-card-title">Primary Contact</h3>
            <div class="comp-form-group">
                <label class="comp-form-label">Contact Name</label>
                <input type="text" class="comp-form-input" value="John Doe">
            </div>
            <div class="comp-form-group">
                <label class="comp-form-label">Contact Email</label>
                <input type="email" class="comp-form-input" value="contact@company.com">
            </div>
            <div class="comp-form-group">
                <label class="comp-form-label">Contact Phone</label>
                <input type="text" class="comp-form-input" value="+234 123 456 7890">
            </div>
        </div>
    </main>

</body>
</html>
