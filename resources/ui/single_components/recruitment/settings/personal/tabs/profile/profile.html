<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Personal Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="cfg-body">

    <main class="cfg-tab-container">
        <div class="cfg-card">
            <h3 class="cfg-card-title">Profile Photo</h3>
            <div class="cfg-avatar-upload-row">
                <div class="cfg-avatar-large">
                    ED
                    <div class="cfg-avatar-overlay-icon"><i class="fa-solid fa-camera"></i></div>
                </div>
                <div class="cfg-upload-meta">
                    <span class="cfg-upload-btn">Upload profile photo</span>
                    <p class="cfg-upload-hint">JPG, PNG or GIF. Max size 5MB.</p>
                </div>
            </div>
        </div>

        <div class="cfg-card">
            <h3 class="cfg-card-title">Personal Information</h3>
            <div class="cfg-form-group">
                <label class="cfg-form-label">Full Name <span class="cfg-required">*</span></label>
                <input type="text" class="cfg-form-input" value="John Doe">
            </div>
            <div class="cfg-form-group">
                <label class="cfg-form-label">Email <span class="cfg-required">*</span></label>
                <input type="email" class="cfg-form-input" value="john@company.com">
            </div>
            <div class="cfg-form-group">
                <label class="cfg-form-label">Language</label>
                <select class="cfg-form-select">
                    <option selected>English (US)</option>
                    <option>Español</option>
                    <option>Français</option>
                </select>
            </div>
            <div class="cfg-form-group">
                <label class="cfg-form-label">Timezone</label>
                <select class="cfg-form-select">
                    <option selected>Africa/Lagos (WAT)</option>
                    <option>Europe/London (GMT)</option>
                    <option>America/New_York (EST)</option>
                </select>
            </div>
        </div>
    </main>

</body>
</html>
