<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Row</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rec-label-row">
    <div class="rec-label-dot"></div>
    <div class="rec-label-row-body">
      <div class="rec-label-row-name">
        Top Performer
        <span class="rec-label-row-count">(1 candidate)</span>
      </div>
      <div class="rec-label-row-desc">High-potential candidates with excellent qualifications</div>
      <div class="rec-label-row-created">Created 6/8/2026 by System</div>
    </div>
    <div class="rec-label-row-actions">
      <button class="rec-label-action-btn"><i class="fa-solid fa-pencil"></i></button>
      <button class="rec-label-action-btn"><i class="fa-solid fa-trash-can"></i></button>
    </div>
  </div>
</body>
</html>
