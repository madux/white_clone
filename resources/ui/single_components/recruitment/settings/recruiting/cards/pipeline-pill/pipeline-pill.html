<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Pill</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rec-list-row">
    <div>
      <span class="rec-list-row-name">Default Pipeline</span>
      <span style="font-size:12px;color:#9ca3af;margin-left:6px;">24 positions</span>
    </div>
    <div class="rec-pill-group">
      <span class="rec-pill">Applied</span>
      <span class="rec-pill">Phone Screen</span>
      <span class="rec-pill">Interview</span>
      <span class="rec-pill">Offer</span>
      <span class="rec-pill">Hired</span>
    </div>
  </div>
  <div class="rec-list-row">
    <div>
      <span class="rec-list-row-name">Executive Hiring</span>
      <span style="font-size:12px;color:#9ca3af;margin-left:6px;">3 positions</span>
    </div>
    <div class="rec-pill-group">
      <span class="rec-pill">Applied</span>
      <span class="rec-pill">Initial Review</span>
      <span class="rec-pill">Panel Interview</span>
      <span class="rec-pill">Final Interview</span>
      <span class="rec-pill">Background Check</span>
      <span class="rec-pill">Offer</span>
      <span class="rec-pill">Hired</span>
    </div>
  </div>
</body>
</html>
