<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stat Row</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rec-stats-row">
    <div class="rec-stat-cell">
      <div class="rec-stat-num">6</div>
      <div class="rec-stat-label">Total Labels</div>
    </div>
    <div class="rec-stat-cell">
      <div class="rec-stat-num">3</div>
      <div class="rec-stat-label">Labeled Candidates</div>
    </div>
    <div class="rec-stat-cell">
      <div class="rec-stat-num">0</div>
      <div class="rec-stat-label">Unlabeled Candidates</div>
    </div>
  </div>
</body>
</html>
