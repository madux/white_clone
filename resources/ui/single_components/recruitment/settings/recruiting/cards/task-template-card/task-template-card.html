<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Template Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Full template card -->
  <div class="rec-template-card">
    <div class="rec-template-card-head">
      <div class="rec-template-card-icon"><i class="fa-solid fa-laptop"></i></div>
      <div>
        <div class="rec-template-card-title">Software Engineering Hire</div>
        <div class="rec-template-card-meta">
          <span class="rec-template-badge">9 tasks</span>
          <span class="rec-template-badge">Used 12×</span>
        </div>
        <div class="rec-template-date">Last used: Mar 20</div>
      </div>
    </div>
    <div class="rec-template-tasks">
      <div class="rec-template-task-item"><i class="fa-regular fa-circle"></i> Resume Review</div>
      <div class="rec-template-task-item"><i class="fa-regular fa-circle"></i> Phone Screen</div>
      <div class="rec-template-task-item"><i class="fa-regular fa-circle"></i> Technical Interview</div>
    </div>
    <div class="rec-template-more">and 6 more tasks</div>
    <div class="rec-template-actions">
      <button class="rec-btn rec-btn--secondary rec-btn--sm">Preview</button>
      <button class="rec-btn rec-btn--secondary rec-btn--sm">Edit</button>
      <button class="rec-btn rec-btn--danger rec-btn--sm" style="margin-left:auto">Delete</button>
    </div>
  </div>

  <!-- New template card variant -->
  <!--
  <div class="rec-template-card rec-template-card--new">
    <div class="rec-template-card-head">
      <div class="rec-template-card-icon"><i class="fa-solid fa-plus"></i></div>
      <div class="rec-template-card-title">Create New Template</div>
    </div>
  </div>
  -->
</body>
</html>
