<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Row</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rec-list-row">
    <div>
      <div style="font-weight:600;color:#111827;font-size:14px;">Lock tags after creation</div>
      <div style="font-size:13px;color:#6b7280;margin-top:2px;">Prevent editing tags once they're created</div>
    </div>
    <label class="rec-toggle">
      <input type="checkbox">
      <span class="rec-toggle-slider"></span>
    </label>
  </div>
  <div class="rec-list-row">
    <div>
      <div style="font-weight:600;color:#111827;font-size:14px;">Lock sources after creation</div>
      <div style="font-size:13px;color:#6b7280;margin-top:2px;">Prevent editing candidate sources once they're created</div>
    </div>
    <label class="rec-toggle">
      <input type="checkbox">
      <span class="rec-toggle-slider"></span>
    </label>
  </div>
  <div class="rec-list-row">
    <div>
      <div style="font-weight:600;color:#111827;font-size:14px;">Auto-archive old candidates</div>
      <div style="font-size:13px;color:#6b7280;margin-top:2px;">Automatically archive candidates after 1 year of inactivity</div>
    </div>
    <label class="rec-toggle">
      <input type="checkbox" checked>
      <span class="rec-toggle-slider"></span>
    </label>
  </div>
</body>
</html>
