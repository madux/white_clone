<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Fields</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-cf-rec-card">
    <div class="rct-cf-rec-card-header">
      <span class="rct-cf-rec-card-title">Custom Fields</span>
      <button class="rct-cf-rec-btn rct-cf-rec-btn--primary"><i class="fas fa-plus"></i> Add Field</button>
    </div>
    <div class="rct-cf-rec-list-row">
      <div class="rct-cf-rec-list-row-left">
        <span class="rct-cf-rec-list-row-name">Budget</span>
        <span class="rct-cf-rec-list-row-meta">Position &middot; Number</span>
      </div>
      <span class="rct-cf-rec-tag rct-cf-rec-tag--finance">Finance</span>
    </div>
    <div class="rct-cf-rec-list-row">
      <div class="rct-cf-rec-list-row-left">
        <span class="rct-cf-rec-list-row-name">References</span>
        <span class="rct-cf-rec-list-row-meta">Candidate &middot; Text</span>
      </div>
      <span class="rct-cf-rec-tag rct-cf-rec-tag--general">General</span>
    </div>
  </div>
</body>
</html>
