<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Controls</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-dc-rec-card">
    <div class="rct-dc-rec-card-header">
      <span class="rct-dc-rec-card-title">Data Controls</span>
    </div>
    <div class="rct-dc-toggle-row">
      <div class="rct-dc-toggle-info">
        <span class="rct-dc-toggle-label">Lock tags after creation</span>
        <span class="rct-dc-toggle-desc">Prevent editing tags once they're created</span>
      </div>
      <label class="rct-dc-toggle">
        <input type="checkbox">
        <span class="rct-dc-toggle-slider"></span>
      </label>
    </div>
    <div class="rct-dc-toggle-row">
      <div class="rct-dc-toggle-info">
        <span class="rct-dc-toggle-label">Lock sources after creation</span>
        <span class="rct-dc-toggle-desc">Prevent editing candidate sources once they're created</span>
      </div>
      <label class="rct-dc-toggle">
        <input type="checkbox">
        <span class="rct-dc-toggle-slider"></span>
      </label>
    </div>
    <div class="rct-dc-toggle-row">
      <div class="rct-dc-toggle-info">
        <span class="rct-dc-toggle-label">Auto-archive old candidates</span>
        <span class="rct-dc-toggle-desc">Automatically archive candidates after 1 year of inactivity</span>
      </div>
      <label class="rct-dc-toggle">
        <input type="checkbox" checked>
        <span class="rct-dc-toggle-slider"></span>
      </label>
    </div>
  </div>
</body>
</html>
