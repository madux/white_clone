<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Guides</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-ig-rec-card">
    <div class="rct-ig-rec-card-header">
      <span class="rct-ig-rec-card-title">Interview Guides</span>
      <button class="rct-ig-rec-btn rct-ig-rec-btn--primary"><i class="fas fa-plus"></i> Create Guide</button>
    </div>
    <div class="rct-ig-rec-list-row">
      <div class="rct-ig-rec-list-row-left">
        <span class="rct-ig-rec-list-row-name">Technical Interview</span>
        <span class="rct-ig-rec-list-row-meta">12 questions</span>
      </div>
      <span class="rct-ig-rec-tag rct-ig-rec-tag--engineering">Engineering</span>
    </div>
    <div class="rct-ig-rec-list-row">
      <div class="rct-ig-rec-list-row-left">
        <span class="rct-ig-rec-list-row-name">Cultural Fit</span>
        <span class="rct-ig-rec-list-row-meta">8 questions</span>
      </div>
      <span class="rct-ig-rec-tag rct-ig-rec-tag--general">General</span>
    </div>
  </div>
</body>
</html>
