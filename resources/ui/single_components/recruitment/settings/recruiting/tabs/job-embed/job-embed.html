<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Embed</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-je-rec-card">
    <div class="rct-je-rec-card-header">
      <span class="rct-je-rec-card-title">Job Listing Embed Code</span>
    </div>
    <p class="rct-je-desc">Copy and paste this embed code into your website's HTML to display your active job listings.</p>
    <div class="rct-je-code-block">
      &lt;script src="https://careers.cleonhr.com/embed.js"&gt;&lt;/script&gt;<br>
      &lt;div data-cleonhr-widget="jobs"&gt;&lt;/div&gt;
    </div>
  </div>
</body>
</html>
