<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Templates</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-pl-rec-card">
    <div class="rct-pl-rec-card-header">
      <span class="rct-pl-rec-card-title">Pipeline Templates</span>
      <button class="rct-pl-rec-btn rct-pl-rec-btn--primary"><i class="fas fa-plus"></i> Create Pipeline</button>
    </div>
    <div class="rct-pl-list-row">
      <div class="rct-pl-row-top">
        <span class="rct-pl-list-row-name">Default Pipeline</span>
        <span class="rct-pl-list-row-meta">24 positions</span>
      </div>
      <div class="rct-pl-pills">
        <span class="rct-pl-pill">Applied</span>
        <span class="rct-pl-pill">Phone Screen</span>
        <span class="rct-pl-pill">Interview</span>
        <span class="rct-pl-pill">Offer</span>
        <span class="rct-pl-pill">Hired</span>
      </div>
    </div>
    <div class="rct-pl-list-row">
      <div class="rct-pl-row-top">
        <span class="rct-pl-list-row-name">Executive Hiring</span>
        <span class="rct-pl-list-row-meta">3 positions</span>
      </div>
      <div class="rct-pl-pills">
        <span class="rct-pl-pill">Applied</span>
        <span class="rct-pl-pill">Initial Review</span>
        <span class="rct-pl-pill">Panel Interview</span>
        <span class="rct-pl-pill">Final Interview</span>
        <span class="rct-pl-pill">Background Check</span>
        <span class="rct-pl-pill">Offer</span>
        <span class="rct-pl-pill">Hired</span>
      </div>
    </div>
  </div>
</body>
</html>
