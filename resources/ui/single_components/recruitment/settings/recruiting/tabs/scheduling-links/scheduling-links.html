<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduling Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-sl-rec-card">
    <div class="rct-sl-rec-card-header">
      <span class="rct-sl-rec-card-title">Scheduling Links</span>
      <button class="rct-sl-rec-btn rct-sl-rec-btn--primary"><i class="fas fa-plus"></i> Create Link</button>
    </div>
    <div class="rct-sl-link-row">
      <div class="rct-sl-link-info">
        <span class="rct-sl-link-name">30-min Phone Screen</span>
        <span class="rct-sl-link-url">cleonhr.com/book/phone-screen-abc</span>
      </div>
      <div class="rct-sl-link-actions">
        <span class="rct-sl-badge">30 min</span>
        <button class="rct-sl-btn-copy"><i class="far fa-copy"></i> Copy</button>
      </div>
    </div>
    <div class="rct-sl-link-row">
      <div class="rct-sl-link-info">
        <span class="rct-sl-link-name">1-hour Technical</span>
        <span class="rct-sl-link-url">cleonhr.com/book/technical-def</span>
      </div>
      <div class="rct-sl-link-actions">
        <span class="rct-sl-badge">60 min</span>
        <button class="rct-sl-btn-copy"><i class="far fa-copy"></i> Copy</button>
      </div>
    </div>
  </div>
</body>
</html>
