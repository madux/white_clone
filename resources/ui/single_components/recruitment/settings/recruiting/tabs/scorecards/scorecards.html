<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorecard Library</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="rct-sc-rec-card">
    <div class="rct-sc-rec-card-header">
      <span class="rct-sc-rec-card-title">Scorecard Library</span>
      <button class="rct-sc-rec-btn rct-sc-rec-btn--primary"><i class="fas fa-plus"></i> Create Scorecard</button>
    </div>
    <div class="rct-sc-rec-list-row">
      <div class="rct-sc-rec-list-row-left">
        <span class="rct-sc-rec-list-row-name">Technical Skills</span>
        <span class="rct-sc-rec-list-row-meta">criteria</span>
      </div>
      <span class="rct-sc-rec-badge"><i class="fas fa-lock"></i> Locked</span>
    </div>
    <div class="rct-sc-rec-list-row">
      <div class="rct-sc-rec-list-row-left">
        <span class="rct-sc-rec-list-row-name">Communication</span>
        <span class="rct-sc-rec-list-row-meta">criteria</span>
      </div>
    </div>
  </div>
</body>
</html>
